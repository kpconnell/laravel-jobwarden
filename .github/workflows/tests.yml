name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · ${{ matrix.db }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        laravel: ['11.*', '12.*']
        db: [sqlite, mysql, pgsql]
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: jobwarden
          MARIADB_USER: jobwarden
          MARIADB_PASSWORD: secret
          MARIADB_ROOT_PASSWORD: rootsecret
        ports: ['3306:3306']
        # Note: READ COMMITTED + MYSQL_ATTR_FOUND_ROWS are forced per-connection by
        # the service provider (alignMysqlRowSemantics), so no server flag is needed
        # here — and GitHub service containers can't override the container command.
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=20
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: jobwarden
          POSTGRES_USER: jobwarden
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U jobwarden" --health-interval=5s
          --health-timeout=5s --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pcntl, posix, pdo_sqlite, pdo_mysql, pdo_pgsql, sockets
          coverage: none

      # The compat matrix tests against Laravel 11, whose framework releases are
      # flagged by advisories that were only fixed in 12.x; don't let Composer's
      # advisory policy exclude them from the solver during CI resolution.
      - name: Allow advisory-flagged versions (CI compatibility)
        run: composer config --no-plugins policy.advisories.block false

      - name: Constrain Laravel + Testbench
        run: composer require "illuminate/support:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --no-audit

      - name: Run tests (${{ matrix.db }})
        env:
          JOBWARDEN_TEST_DB: ${{ matrix.db }}
          JOBWARDEN_DB_DRIVER: ${{ matrix.db }}
          JOBWARDEN_DB_HOST: 127.0.0.1
          JOBWARDEN_DB_PORT: ${{ matrix.db == 'pgsql' && '5432' || '3306' }}
          JOBWARDEN_DB_NAME: jobwarden
          JOBWARDEN_DB_USER: jobwarden
          JOBWARDEN_DB_PASSWORD: secret
        run: vendor/bin/testbench package:test
