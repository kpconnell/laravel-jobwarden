# JobWarden — realistic local-dev topology.
#
# A "host" is ONE container that takes on many ROLES (supervisor, scheduled
# worker, local reaper, scheduler, global reaper, dashboard) — chosen with
# JOBWARDEN_ROLES (default: all). Supervisor + local reaper are just two
# processes in the same box, so /proc + signals work with no cross-container
# PID-namespace coupling. Scale hosts with:
#
#     docker compose up -d --scale host=3
#
# Running every role on every host is safe: the DB coordinates the singletons
# (global reaper via its leader lease, scheduler via SKIP LOCKED + a unique
# occurrence constraint), so the database decides who is actually active.
#
# The IMAGE is the portable unit — init is baked in (tini), roles are env-driven —
# so the same image drops into ECS / ACI / k8s unchanged; only this compose
# wrapper is Docker-specific.

x-host: &host
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: jobwarden-host
  # NO source bind mount. The app + package are fully baked to /srv/app (see the
  # Dockerfile FULL BAKE). A `.:/app` mount would only spin up a host-side
  # `virtiofsd` serving files no process opens — and on Docker Desktop that daemon
  # pegs the Mac's CPU while the guest VM sits starved (the classic "guest idle,
  # host at 100%" that inflated per-job boots to seconds of pure off-CPU wait).
  # Source edits already require a rebuild (opcache validate_timestamps=0), so the
  # mount bought nothing. Rebuild to pick up code changes.
  environment: &env
    JOBWARDEN_TEST_DB: mysql
    JOBWARDEN_DB_DRIVER: mysql
    JOBWARDEN_DB_HOST: db
    JOBWARDEN_DB_PORT: "3306"
    JOBWARDEN_DB_NAME: jobwarden
    JOBWARDEN_DB_USER: jobwarden
    JOBWARDEN_DB_PASSWORD: secret
    # Roles run the BAKED real Laravel app's artisan (on the image's overlayfs, off
    # the virtiofs bind mount). The launcher reads this; child job runners inherit
    # it via base_path('artisan').
    JOBWARDEN_ARTISAN: "php /srv/app/artisan"
    # Deliberately small: on Docker Desktop the host-side helper (VM + disk),
    # not the guest, is the scarce resource, so we run FEW concurrent boots and
    # let each get real cycles. 2 hosts x 5 = 10 concurrent children total.
    JOBWARDEN_CAPACITY: "5"
    # EXPERIMENT: the supervisor sleeps this long between loop iterations, so with
    # the default 500ms a freed slot stays empty until the next tick -> the fleet
    # runs in waves of `capacity` (period ~= poll interval) and averages
    # ~capacity/poll = 20/s. Dropping it to 50ms refills slots ~10x sooner to test
    # whether the waves flatten. If confirmed, replace with adaptive cadence in the
    # Supervisor (fast under load, back off when idle) so idle fleets don't hammer
    # the DB at 20 polls/sec.
    JOBWARDEN_POLL_INTERVAL_MS: "50"
  restart: unless-stopped

services:
  # ---- the one durable stateful service ------------------------------------
  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: jobwarden
      MARIADB_USER: jobwarden
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: rootsecret
    # READ-COMMITTED is required by the claim path. The InnoDB buffer pool is
    # bumped WELL above the 128M default because it sizes BOTH the page cache and
    # the lock table: a large queued backlog drained via FOR UPDATE SKIP LOCKED can
    # otherwise blow the lock table ("1206: total number of locks exceeds the lock
    # table size") and OOM the container (exit 137). max_connections covers the
    # fleet (10 hosts x supervisor + co-reaper + per-job children). Both are
    # env-overridable so you can dial them to the Docker VM's memory.
    command:
      - "--transaction-isolation=READ-COMMITTED"
      - "--innodb-buffer-pool-size=${MARIADB_BUFFER_POOL:-2G}"
      - "--innodb-log-file-size=${MARIADB_LOG_FILE_SIZE:-512M}"
      - "--max-connections=${MARIADB_MAX_CONNECTIONS:-500}"
      # Each job commits several small transactions (attempt/job transitions +
      # events + logs). With the default flush=1 that's an fsync PER COMMIT, and on
      # Docker Desktop's virtualized disk each fsync stalls ~ms → dominates per-job
      # latency (the ~1.7s DB overhead). =2 writes to the OS cache on commit and
      # fsyncs ~once/sec: no per-commit disk wait. Durability: an OS/host crash can
      # lose ~1s; a graceful mysqld restart loses nothing. Set =1 for strict ACID.
      - "--innodb-flush-log-at-trx-commit=${MARIADB_FLUSH_LOG:-2}"
    # Soft floor only — no HARD mem_limit, so we never re-trigger the container OOM
    # (exit 137) by capping the db below what its buffer pool + connections need.
    # The 2G buffer pool is the real memory bound; raise MARIADB_BUFFER_POOL if the
    # Docker VM has room to spare.
    mem_reservation: "${MARIADB_MEM_RESERVATION:-2g}"
    volumes:
      - jobwarden-maria-data:/var/lib/mysql     # durable named volume
    ports:
      - "33060:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 3s
      retries: 40

  # Optional Postgres for the 3-engine test matrix (not started by default):
  #   docker compose --profile pg up -d pg
  pg:
    profiles: ["pg"]
    image: postgres:18
    environment:
      POSTGRES_DB: jobwarden
      POSTGRES_USER: jobwarden
      POSTGRES_PASSWORD: secret
    volumes:
      - jobwarden-pg-data:/var/lib/postgresql/data
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobwarden -d jobwarden"]
      interval: 2s
      timeout: 3s
      retries: 30

  # ---- one-shot: create the schema, then exit. Hosts wait on it. -----------
  migrate:
    <<: *host
    restart: "no"
    command: ["sh", "-lc", "cd /srv/app && php artisan migrate --force"]
    depends_on:
      db:
        condition: service_healthy

  # ---- the scalable worker host: many roles per container ------------------
  # Every host runs the worker + coordination roles; the DB coordinates the
  # singletons (global reaper via its lease, scheduler via SKIP LOCKED), so it's
  # safe on every replica. Scale hosts with:  docker compose up -d --scale host=3
  host:
    <<: *host
    environment:
      <<: *env
      JOBWARDEN_ROLES: "supervisor,scheduled-worker,scheduler,global-reaper"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ---- dashboard / operator API: same image, just the dashboard role -------
  # Split out so it owns a stable published port while worker hosts scale freely.
  dashboard:
    <<: *host
    environment:
      <<: *env
      JOBWARDEN_ROLES: "dashboard"
    ports:
      - "8899:8080"          # http://localhost:8899/jobwarden
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  jobwarden-maria-data:
  jobwarden-pg-data:
