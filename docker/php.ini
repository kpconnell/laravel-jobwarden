memory_limit = 512M
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
date.timezone = UTC

; OPcache. The per-job child (`jobwarden:run`) cold-boots the whole framework, so
; without this every job re-parses+compiles thousands of files (2-5 CPU-sec/job).
; The in-memory SHM cache can't help short-lived CLI processes (it dies with each
; one), so we use a DISK-backed file_cache (/tmp = fast overlayfs) that persists
; compiled bytecode across invocations.
;
; validate_timestamps=0 is the key: the app source lives on Docker Desktop's
; virtiofs bind mount, whose flaky mtimes make opcache think every file changed
; and RECOMPILE the whole framework on every boot (~8 CPU-sec/job). Trusting the
; cache (never re-stat) stops that dead. Trade-off: source edits need a container
; restart (which clears /tmp and recompiles the current tree) to take effect.
opcache.enable = 1
opcache.enable_cli = 1
opcache.file_cache = /tmp/jobwarden-opcache
opcache.file_cache_only = 1
opcache.max_accelerated_files = 30000
opcache.validate_timestamps = 0

; Required by the supervisor/child execution model.
; (cli_set_process_title is always available in CLI; listed for clarity.)
